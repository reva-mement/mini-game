<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LevaCraft Mini Games</title>
<style>
  :root {
    --bg-deep: #10162b;
    --bg-panel: #1a2140;
    --ink: #eef0fb;
    --ink-dim: #9099c2;
    --line: #2c3560;
    --accent: #ffd15c;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at 50% -10%, #232c52 0%, var(--bg-deep) 55%, #0a0e1e 100%);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
  }

  .cat-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image: var(--cat-bg, none);
    background-repeat: repeat;
    background-size: 90px 90px;
    opacity: var(--cat-opacity, 0);
    transition: opacity 200ms ease;
  }

  .stage {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    padding: 40px 18px 40px;
  }

  header {
    margin-bottom: 26px;
    text-align: center;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.32em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin: 0 0 6px;
  }

  h1 {
    font-family: Georgia, "Hiragino Mincho ProN", serif;
    font-size: clamp(24px, 7vw, 32px);
    margin: 0 0 10px;
    font-weight: 700;
    background: linear-gradient(120deg, #fff, #b9c2ff 60%, var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .tagline {
    font-size: 12.5px;
    color: var(--ink-dim);
    line-height: 1.7;
    margin: 0;
  }

  .bg-toggle {
    display: block;
    width: 100%;
    margin-bottom: 20px;
    background: none;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    border-radius: 10px;
    padding: 9px;
    font-size: 12px;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: border-color 120ms ease, color 120ms ease;
  }

  .bg-toggle:hover {
    border-color: var(--accent);
    color: var(--ink);
  }

  .game-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .game-card {
    position: relative;
    display: block;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px;
    text-decoration: none;
    color: var(--ink);
    box-shadow: 0 20px 60px -24px rgba(0,0,0,0.6);
    transition: border-color 160ms ease, transform 160ms ease;
    overflow: hidden;
  }

  .game-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .game-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.5;
    pointer-events: none;
  }

  .card-2048::before {
    background: radial-gradient(circle at 85% 0%, rgba(255,209,92,0.16), transparent 60%);
  }

  .card-tetris::before {
    background: radial-gradient(circle at 85% 0%, rgba(124,140,255,0.18), transparent 60%);
  }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }

  .card-eyebrow {
    font-size: 10px;
    letter-spacing: 0.28em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin: 0;
    position: relative;
  }

  .card-title {
    font-family: Georgia, "Hiragino Mincho ProN", serif;
    font-size: 22px;
    font-weight: 700;
    margin: 2px 0 8px;
    position: relative;
  }

  .card-desc {
    font-size: 12.5px;
    color: var(--ink-dim);
    line-height: 1.6;
    margin: 0 0 14px;
    position: relative;
  }

  .card-cta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    position: relative;
  }

  .best-pill {
    position: relative;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--ink-dim);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  .best-pill strong {
    color: var(--ink);
    font-weight: 700;
  }

  .link-group {
    margin-top: 26px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .footer-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--ink-dim);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.02em;
    padding: 8px;
    border: 1px solid var(--line);
    border-radius: 8px;
    transition: border-color 120ms ease, color 120ms ease;
  }

  .footer-link:hover {
    border-color: var(--accent);
    color: var(--ink);
  }

  .footer-link .icon {
    font-size: 13px;
    font-weight: 700;
    width: 18px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="cat-layer" id="catLayer"></div>

<div class="stage">
  <header>
    <p class="eyebrow">LEVACRAFT</p>
    <h1>ミニゲーム置き場</h1>
    <p class="tagline">息抜きに作った、広告なしの小さなゲームたち。<br>気の向くまま、遊んでいってください。</p>
  </header>

  <button class="bg-toggle" id="bgToggle">🐾 背景: <span id="bgToggleLabel">なし</span></button>

  <div class="game-list">
    <a class="game-card card-2048" href="2048.html">
      <div class="card-top">
        <p class="card-eyebrow">PUZZLE</p>
        <span class="best-pill" id="best2048">BEST -</span>
      </div>
      <div class="card-title">2048 — 夜明けまで</div>
      <p class="card-desc">同じ数字を合わせて2048を目指す、定番スライドパズル。到達すると盤面がきらめいて消える特典つき。</p>
      <div class="card-cta">遊ぶ →</div>
    </a>

    <a class="game-card card-tetris" href="tetris.html">
      <div class="card-top">
        <p class="card-eyebrow">ACTION</p>
        <span class="best-pill" id="bestTetris">BEST -</span>
      </div>
      <div class="card-title">テトリス — 降り積む夜</div>
      <p class="card-desc">落ちてくるブロックを並べて行を消す、あの定番アクション。スマホのタッチ操作にも対応。</p>
      <div class="card-cta">遊ぶ →</div>
    </a>
  </div>

  <div class="link-group">
    <a class="footer-link" href="https://x.com/LevaCraft" target="_blank" rel="noopener noreferrer">
      <span class="icon">𝕏</span> @LevaCraft
    </a>
    <a class="footer-link" href="https://youtube.com/@levacraft-b9v?si=z2kzSiArr_hE2uIf" target="_blank" rel="noopener noreferrer">
      <span class="icon">▶</span> YouTube
    </a>
  </div>
</div>

<script>
(function(){
  // show each game's best score on its card, if already played on this device
  function readBest(key){
    try {
      const v = localStorage.getItem(key);
      return v ? parseInt(v, 10) || 0 : null;
    } catch (e) { return null; }
  }

  const best2048 = readBest('game2048_best');
  const bestTetris = readBest('tetris_best');

  const el2048 = document.getElementById('best2048');
  const elTetris = document.getElementById('bestTetris');

  el2048.innerHTML = best2048 !== null ? `BEST <strong>${best2048}</strong>` : 'BEST -';
  elTetris.innerHTML = bestTetris !== null ? `BEST <strong>${bestTetris}</strong>` : 'BEST -';

  // ---- switchable cat background (shared visual language with the games) ----
  const bgToggle = document.getElementById('bgToggle');
  const bgToggleLabel = document.getElementById('bgToggleLabel');
  const CAT_THEME_KEY = 'hub_catTheme';

  function catSVG(color){
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60' viewBox='0 0 60 60'>
      <g fill='${color}'>
        <polygon points='14,16 20,4 26,16'/>
        <polygon points='34,16 40,4 46,16'/>
        <circle cx='30' cy='28' r='14'/>
      </g>
      <g stroke='${color}' stroke-width='1.4' fill='none' opacity='0.9'>
        <line x1='10' y1='30' x2='0' y2='27'/>
        <line x1='10' y1='34' x2='0' y2='35'/>
        <line x1='50' y1='30' x2='60' y2='27'/>
        <line x1='50' y1='34' x2='60' y2='35'/>
      </g>
    </svg>`;
    return `url("data:image/svg+xml,${encodeURIComponent(svg)}")`;
  }

  const CAT_THEMES = [
    { label: 'なし', bg: 'none', opacity: 0 },
    { label: '🐈 三毛猫', bg: catSVG('#ffb15c'), opacity: 0.16 },
    { label: '🐈\u200d⬛ 黒猫', bg: catSVG('#b39dff'), opacity: 0.14 },
    { label: '😺 白猫', bg: catSVG('#ffdcec'), opacity: 0.12 }
  ];

  function loadCatTheme(){
    try {
      const saved = parseInt(localStorage.getItem(CAT_THEME_KEY), 10);
      return Number.isInteger(saved) && CAT_THEMES[saved] ? saved : 0;
    } catch (e) { return 0; }
  }

  function saveCatTheme(idx){
    try { localStorage.setItem(CAT_THEME_KEY, String(idx)); } catch (e) {}
  }

  function applyCatTheme(idx){
    const theme = CAT_THEMES[idx];
    document.documentElement.style.setProperty('--cat-bg', theme.bg);
    document.documentElement.style.setProperty('--cat-opacity', theme.opacity);
    bgToggleLabel.textContent = theme.label;
  }

  let catThemeIndex = loadCatTheme();
  applyCatTheme(catThemeIndex);

  bgToggle.addEventListener('click', () => {
    catThemeIndex = (catThemeIndex + 1) % CAT_THEMES.length;
    applyCatTheme(catThemeIndex);
    saveCatTheme(catThemeIndex);
  });
})();
</script>

</body>
</html>
