<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>テトリス — 降り積む夜</title>
<style>
  :root {
    --bg-deep: #10162b;
    --bg-panel: #1a2140;
    --ink: #eef0fb;
    --ink-dim: #9099c2;
    --line: #2c3560;
    --accent: #ffd15c;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at 50% -10%, #232c52 0%, var(--bg-deep) 55%, #0a0e1e 100%);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
  }

  .stage {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    padding: 14px 14px 10px;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    row-gap: 6px;
    margin-bottom: 10px;
  }

  .title-block .eyebrow {
    font-size: 9px;
    letter-spacing: 0.28em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin: 0 0 2px;
  }

  .title-block h1 {
    font-family: Georgia, "Hiragino Mincho ProN", serif;
    font-size: clamp(17px, 5vw, 24px);
    margin: 0;
    font-weight: 700;
    white-space: nowrap;
    background: linear-gradient(120deg, #fff, #b9c2ff 60%, var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .scores {
    display: flex;
    gap: 6px;
  }

  .score-box {
    position: relative;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 5px 7px;
    text-align: center;
    min-width: 44px;
  }

  .score-box .label {
    font-size: 7.5px;
    letter-spacing: 0.14em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }

  .score-box .value {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  .next-box canvas {
    display: block;
    width: 26px;
    height: 26px;
    margin: 2px auto 0;
    border-radius: 4px;
    background: #0a0e1e;
  }

  .new-badge {
    position: absolute;
    top: -9px;
    left: -8px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.02em;
    padding: 1px 5px;
    border-radius: 6px;
    background: #1a2140;
    background-image: linear-gradient(90deg, #ff5c5c, #ffb15c, #ffe15c, #7be08a, #5cc8ff, #b39dff, #ff5c5c);
    background-size: 250% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    opacity: 0;
    transform: scale(0.7) rotate(-8deg);
    transition: opacity 160ms ease, transform 160ms ease;
    pointer-events: none;
    white-space: nowrap;
  }

  .new-badge.show {
    opacity: 1;
    transform: scale(1) rotate(-8deg);
    animation: badge-shimmer 1.4s linear infinite;
  }

  @keyframes badge-shimmer {
    from { background-position: 0% center; }
    to { background-position: 250% center; }
  }

  .board-wrap {
    position: relative;
    background: var(--bg-panel);
    border-radius: 14px;
    padding: 8px;
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.6), inset 0 0 0 1px var(--line);
    display: flex;
    justify-content: center;
  }

  #tetris {
    display: block;
    width: 100%;
    max-width: 218px;
    height: auto;
    border-radius: 6px;
    background: #0a0e1e;
    touch-action: none;
  }

  .overlay {
    position: absolute;
    z-index: 10;
    inset: 8px;
    background: rgba(16, 22, 43, 0.9);
    border-radius: 10px;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    backdrop-filter: blur(2px);
    text-align: center;
    padding: 14px;
  }

  .overlay.show { display: flex; }

  .overlay .msg {
    font-family: Georgia, serif;
    font-size: 18px;
    font-weight: 700;
  }

  .overlay .sub {
    font-size: 11px;
    color: var(--ink-dim);
  }

  .overlay button {
    background: var(--accent);
    color: #241a05;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }

  .spacer {
    flex: 1 1 auto;
    min-height: 36px;
  }

  .play-controls {
    display: flex;
    gap: 8px;
  }

  .play-btn {
    flex: 1;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 8px;
    padding: 9px 0;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 100ms ease, transform 100ms ease;
  }

  .play-btn:active {
    background: #232c52;
    transform: translateY(1px);
  }

  .hint {
    font-size: 10px;
    color: var(--ink-dim);
    line-height: 1.4;
    margin: 4px 0 0;
    text-align: center;
  }

  .nav-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .new-game {
    flex: 1;
    background: var(--accent);
    color: #241a05;
    border: none;
    border-radius: 8px;
    padding: 7px 0;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .new-game:active { transform: translateY(1px); }

  .rank-link {
    flex: 1;
    background: none;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    border-radius: 8px;
    padding: 7px 0;
    font-size: 11px;
    letter-spacing: 0.02em;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 120ms ease, color 120ms ease;
  }

  .rank-link:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .rank-view {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% -10%, #232c52 0%, var(--bg-deep) 55%, #0a0e1e 100%);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    z-index: 20;
    padding: 24px 16px 14px;
    gap: 8px;
    overflow: hidden;
  }

  .rank-view::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: var(--cat-bg, none);
    background-repeat: repeat;
    background-size: 90px 90px;
    opacity: var(--cat-opacity, 0);
    pointer-events: none;
    transition: opacity 200ms ease;
  }

  .rank-view.show { display: flex; }

  .rank-panel {
    position: relative;
    width: 100%;
    max-width: 420px;
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 12px 16px;
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.6);
  }

  .rank-header h2 {
    font-family: Georgia, "Hiragino Mincho ProN", serif;
    font-size: 18px;
    margin: 2px 0 6px;
    background: linear-gradient(120deg, #fff, #b9c2ff 60%, var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .rank-header .eyebrow {
    font-size: 11px;
    letter-spacing: 0.32em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin: 0;
  }

  .rank-list {
    list-style: none;
    margin: 0 0 8px;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .rank-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 9px;
    border-radius: 7px;
    background: rgba(255,255,255,0.03);
    font-variant-numeric: tabular-nums;
  }

  .rank-list li.top1 { background: linear-gradient(90deg, rgba(255,209,92,0.16), transparent); }

  .rank-list .rank-num {
    color: var(--ink-dim);
    font-size: 12px;
    width: 22px;
  }

  .rank-list .rank-score {
    font-weight: 700;
    font-size: 14px;
    flex: 1;
    text-align: left;
    padding-left: 8px;
  }

  .rank-list .rank-date {
    color: var(--ink-dim);
    font-size: 9px;
    white-space: nowrap;
    margin-right: 6px;
  }

  .rank-share {
    background: none;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    border-radius: 6px;
    width: 22px;
    height: 22px;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 120ms ease, color 120ms ease;
  }

  .rank-share:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .rank-empty {
    color: var(--ink-dim);
    font-size: 13px;
    text-align: center;
    padding: 24px 0;
  }

  .back-btn {
    display: block;
    width: 100%;
    background: var(--accent);
    color: #241a05;
    border: none;
    border-radius: 8px;
    padding: 7px;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    margin-bottom: 8px;
  }

  .reset-btn {
    display: block;
    width: 100%;
    margin-top: 6px;
    background: none;
    border: 1px dashed var(--line);
    color: var(--ink-dim);
    border-radius: 8px;
    padding: 6px;
    font-size: 11px;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: border-color 120ms ease, color 120ms ease;
  }

  .reset-btn:hover {
    border-color: #e05263;
    color: #e05263;
  }

  .link-group {
    position: relative;
    width: 100%;
    max-width: 420px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .footer-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--ink-dim);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.02em;
    padding: 8px;
    border: 1px solid var(--line);
    border-radius: 8px;
    transition: border-color 120ms ease, color 120ms ease;
  }

  .footer-link:hover {
    border-color: var(--accent);
    color: var(--ink);
  }

  .footer-link .icon {
    font-size: 13px;
    font-weight: 700;
    width: 18px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="stage">
  <header>
    <div class="title-block">
      <p class="eyebrow">TETRIS</p>
      <h1>降り積む夜</h1>
    </div>
    <div class="scores">
      <div class="score-box">
        <span class="new-badge" id="newBadge">NEW!!</span>
        <div class="label">SCORE</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label">BEST</div>
        <div class="value" id="best">0</div>
      </div>
      <div class="score-box">
        <div class="label">LV</div>
        <div class="value" id="level">1</div>
      </div>
      <div class="score-box next-box">
        <div class="label">NEXT</div>
        <canvas id="nextCanvas" width="26" height="26"></canvas>
      </div>
    </div>
  </header>

  <div class="board-wrap">
    <canvas id="tetris" width="240" height="400"></canvas>
    <div class="overlay" id="overlay">
      <div class="msg" id="overlayMsg">Game Over</div>
      <div class="sub" id="overlaySub"></div>
      <button id="overlayBtn">もう一度</button>
    </div>
  </div>

  <div class="spacer"></div>

  <div class="play-controls">
    <button class="play-btn" id="btnPause">⏸ 一時停止</button>
  </div>
  <p class="hint">タップで回転・上下左右保持で移動・上フリックで即落下</p>

  <div class="nav-row">
    <button class="new-game" id="newGameBtn">新しく始める</button>
    <button class="rank-link" id="rankBtn">歴代ベスト10 →</button>
  </div>
</div>

<div class="rank-view" id="rankView">
  <div class="rank-panel">
    <header class="rank-header">
      <p class="eyebrow">RECORDS</p>
      <h2>歴代ベスト10</h2>
    </header>
    <ol class="rank-list" id="rankList"></ol>
    <button class="back-btn" id="backBtn">← ゲームに戻る</button>
    <button class="reset-btn" id="resetBtn">記録をリセット</button>
  </div>
  <div class="link-group">
    <a class="footer-link" href="https://x.com/LevaCraft" target="_blank" rel="noopener noreferrer">
      <span class="icon">𝕏</span> @LevaCraft
    </a>
    <a class="footer-link" href="https://youtube.com/@levacraft-b9v?si=z2kzSiArr_hE2uIf" target="_blank" rel="noopener noreferrer">
      <span class="icon">▶</span> YouTube
    </a>
  </div>
</div>

<script>
(function(){
  // ============ original Tetris game logic (kept as-is) ============
  const canvas = document.getElementById('tetris');
  const context = canvas.getContext('2d');
  context.scale(20, 20);

  const nextCanvas = document.getElementById('nextCanvas');
  const nextCtx = nextCanvas.getContext('2d');
  const NEXT_BLOCK = 6;

  const COLORS = {
    1: '#5cc8ff', // I
    2: '#ffb15c', // L
    3: '#7c8cff', // J
    4: '#ffe15c', // O
    5: '#ff6b81', // Z
    6: '#7be08a', // S
    7: '#b39dff'  // T
  };

  function createPiece(type) {
    if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
    if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
    if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
    if (type === 'O') return [[4,4],[4,4]];
    if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
    if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
    if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
  }

  function drawNextPreview(){
    nextCtx.fillStyle = '#0a0e1e';
    nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
    const shape = createPiece(nextType);
    const rows = shape.length, cols = shape[0].length;
    const offsetX = (nextCanvas.width - cols * NEXT_BLOCK) / 2;
    const offsetY = (nextCanvas.height - rows * NEXT_BLOCK) / 2;
    shape.forEach((row, y) => {
      row.forEach((value, x) => {
        if (value !== 0) {
          nextCtx.fillStyle = COLORS[value] || '#ffffff';
          nextCtx.fillRect(offsetX + x * NEXT_BLOCK, offsetY + y * NEXT_BLOCK, NEXT_BLOCK - 1, NEXT_BLOCK - 1);
        }
      });
    });
  }

  function createMatrix(w, h) {
    const matrix = [];
    while (h--) matrix.push(new Array(w).fill(0));
    return matrix;
  }

  const HIDDEN_ROWS = 4; // spawn buffer above the visible playfield — gives more room before game over
  const VISIBLE_ROWS = 20;

  function draw() {
    context.fillStyle = '#0a0e1e';
    context.fillRect(0, 0, canvas.width, canvas.height);
    drawMatrix(arena, {x: 0, y: -HIDDEN_ROWS}, clearing ? clearingRows : null, flashOn);
    if (player.matrix) {
      drawGhost();
      drawMatrix(player.matrix, {x: player.pos.x, y: player.pos.y - HIDDEN_ROWS});
    }
  }

  function getGhostPos(){
    const ghostPos = { x: player.pos.x, y: player.pos.y };
    const testPlayer = { matrix: player.matrix, pos: ghostPos };
    while (!collide(arena, testPlayer)) {
      ghostPos.y++;
    }
    ghostPos.y--;
    return ghostPos;
  }

  function drawGhost(){
    const ghostPos = getGhostPos();
    if (ghostPos.y === player.pos.y) return; // already resting, no need to preview
    player.matrix.forEach((row, y) => {
      row.forEach((value, x) => {
        if (value !== 0) {
          context.strokeStyle = COLORS[value] || '#ffffff';
          context.globalAlpha = 0.55;
          context.lineWidth = 0.08;
          context.strokeRect(x + ghostPos.x + 0.05, y + ghostPos.y - HIDDEN_ROWS + 0.05, 0.9, 0.9);
          context.globalAlpha = 1;
        }
      });
    });
  }

  function drawMatrix(matrix, offset, flashRows, flashOn) {
    matrix.forEach((row, y) => {
      const isFlashRow = flashRows && flashRows.includes(y);
      if (isFlashRow && !flashOn) return; // blink "off" phase — leave this row blank
      row.forEach((value, x) => {
        if (value !== 0) {
          context.fillStyle = isFlashRow ? '#ffffff' : (COLORS[value] || '#ffffff');
          context.fillRect(x + offset.x, y + offset.y, 0.94, 0.94);
        }
      });
    });
  }

  function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
      for (let x = 0; x < m[y].length; ++x) {
        if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
      }
    }
    return false;
  }

  function findFullRows() {
    const rows = [];
    for (let y = arena.length - 1; y >= 0; --y) {
      let full = true;
      for (let x = 0; x < arena[y].length; ++x) {
        if (arena[y][x] === 0) { full = false; break; }
      }
      if (full) rows.push(y);
    }
    return rows;
  }

  const FLASH_COUNT = 5;
  const FLASH_INTERVAL = 90;

  function startLineClear(rows) {
    clearing = true;
    clearingRows = rows;
    let toggles = 0;
    flashOn = false; // first tick flips to true, so the row visibly blinks
    clearInterval(flashTimer);
    flashTimer = setInterval(() => {
      flashOn = !flashOn;
      draw();
      if (!flashOn) {
        toggles++;
        if (toggles >= FLASH_COUNT) {
          clearInterval(flashTimer);
          finishLineClear(rows);
        }
      }
    }, FLASH_INTERVAL);
  }

  // non-linear reward: clearing more lines at once is worth more than simple multiplication
  // (ratios follow the classic Tetris guideline: single/double/triple/tetris = 1 / 3 / 5 / 8)
  const LINE_SCORES = { 1: 10, 2: 30, 3: 50, 4: 80 };

  function updateLevel(){
    const newLevel = Math.min(9, 1 + Math.floor(totalLinesCleared / 10));
    if (newLevel !== level) {
      level = newLevel;
      dropInterval = 1000 - (level - 1) * 100; // 1000ms at Lv1 down to 200ms at Lv9
      levelEl.textContent = level;
    }
  }

  function finishLineClear(rows) {
    const rowSet = new Set(rows);
    const width = arena[0].length;
    const remaining = arena.filter((row, index) => !rowSet.has(index));
    const freshRows = rows.map(() => new Array(width).fill(0));
    const rebuilt = freshRows.concat(remaining);
    arena.length = 0;
    rebuilt.forEach(row => arena.push(row));

    totalLinesCleared += rows.length;
    updateLevel();
    player.score += (LINE_SCORES[rows.length] || rows.length * 10) * level;
    updateScore();
    clearing = false;
    clearingRows = [];
    playerReset();
  }

  function merge(arena, player) {
    player.matrix.forEach((row, y) => {
      row.forEach((value, x) => {
        if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
      });
    });
  }

  function rotate(matrix, dir) {
    for (let y = 0; y < matrix.length; ++y) {
      for (let x = 0; x < y; ++x) {
        [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
      }
    }
    if (dir > 0) matrix.forEach(row => row.reverse());
    else matrix.reverse();
  }

  function attemptLock(){
    merge(arena, player);
    const fullRows = findFullRows();
    if (fullRows.length > 0) {
      player.matrix = null; // piece is already locked into the arena — nothing left to draw as "current"
      startLineClear(fullRows);
    } else {
      playerReset();
    }
    lockTimer = 0;
  }

  function isResting(){
    if (!player.matrix) return false;
    player.pos.y++;
    const resting = collide(arena, player);
    player.pos.y--;
    return resting;
  }

  function playerDrop(manual = false) {
    if (gameOver || paused || clearing || !player.matrix) return;
    player.pos.y++;
    if (collide(arena, player)) {
      player.pos.y--;
      return; // resting against something — the lock-delay timer in update() decides when it actually locks
    }
    dropCounter = 0;
    if (manual) {
      player.score += 1; // soft-drop bonus: 1 point per cell moved manually
      updateScore();
    }
  }

  function hardDrop() {
    if (gameOver || paused || clearing || !player.matrix) return;
    const ghost = getGhostPos();
    const distance = ghost.y - player.pos.y;
    if (distance > 0) {
      player.score += distance * 2; // hard-drop bonus: 2 points per cell skipped
      updateScore();
    }
    player.pos.y = ghost.y;
    attemptLock(); // hard drop locks instantly, no grace period
    dropCounter = 0;
  }

  let lastPieceType = null;
  let pieceStreak = 0;

  function randomPieceType(){
    const all = 'ILJOTSZ'.split('');
    const others = lastPieceType ? all.filter(p => p !== lastPieceType) : all;
    let chosen;

    if (lastPieceType && pieceStreak >= 3) {
      // a 4th consecutive repeat is never allowed
      chosen = others[Math.floor(Math.random() * others.length)];
    } else if (lastPieceType && pieceStreak === 2) {
      // a 3rd consecutive repeat happens exactly 1% of the time
      chosen = (Math.random() < 0.01) ? lastPieceType : others[Math.floor(Math.random() * others.length)];
    } else {
      chosen = all[Math.floor(Math.random() * all.length)];
    }

    if (chosen === lastPieceType) {
      pieceStreak++;
    } else {
      lastPieceType = chosen;
      pieceStreak = 1;
    }
    return chosen;
  }

  function playerReset() {
    const type = nextType || randomPieceType();
    player.matrix = createPiece(type);
    nextType = randomPieceType();
    drawNextPreview();
    player.pos.y = 0;
    player.pos.x = 3;
    if (collide(arena, player)) {
      endGame();
    }
  }

  const arena = createMatrix(12, HIDDEN_ROWS + VISIBLE_ROWS);
  const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

  let dropCounter = 0;
  let dropInterval = 1000;
  let lastTime = 0;
  let gameOver = false;
  let paused = false;
  let clearing = false;
  let clearingRows = [];
  let flashOn = false;
  let flashTimer = null;
  let nextType = null;
  let level = 1;
  let totalLinesCleared = 0;
  let lockTimer = 0;
  const LOCK_DELAY = 500; // grace period (ms) after touching down before a piece actually locks

  function update(time = 0) {
    const deltaTime = time - lastTime;
    lastTime = time;
    if (!gameOver && !paused && !clearing) {
      if (isResting()) {
        lockTimer += deltaTime;
        if (lockTimer >= LOCK_DELAY) {
          attemptLock();
        }
      } else {
        lockTimer = 0;
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) playerDrop();
      }
      draw();
    }
    requestAnimationFrame(update);
  }

  function moveLeft(){
    if (gameOver || paused || clearing) return;
    player.pos.x--;
    if (collide(arena, player)) player.pos.x++;
  }
  function moveRight(){
    if (gameOver || paused || clearing) return;
    player.pos.x++;
    if (collide(arena, player)) player.pos.x--;
  }
  function doRotate(dir){
    if (gameOver || paused || clearing || !player.matrix) return;
    const originalMatrix = player.matrix.map(row => row.slice());
    const originalX = player.pos.x;
    const originalY = player.pos.y;
    rotate(player.matrix, dir);

    // try the rotation as-is, then nudge left/right/up to escape walls, other blocks, or the floor
    const kicks = [
      {dx: 0, dy: 0}, {dx: -1, dy: 0}, {dx: 1, dy: 0}, {dx: -2, dy: 0}, {dx: 2, dy: 0},
      {dx: 0, dy: -1}, {dx: -1, dy: -1}, {dx: 1, dy: -1}
    ];
    for (const k of kicks) {
      player.pos.x = originalX + k.dx;
      player.pos.y = originalY + k.dy;
      if (!collide(arena, player)) return; // found a valid spot, keep it
    }

    // no valid position anywhere nearby — revert the rotation entirely
    player.matrix = originalMatrix;
    player.pos.x = originalX;
    player.pos.y = originalY;
  }

  function togglePause(){
    if (gameOver) return;
    paused = !paused;
    if (paused) {
      overlayMsg.textContent = '一時停止中';
      overlaySub.textContent = `スコア: ${player.score}`;
      overlayBtn.textContent = '再開する';
      overlay.classList.add('show');
      pauseBtn.textContent = '▶ 再開';
    } else {
      overlay.classList.remove('show');
      overlayBtn.textContent = 'もう一度';
      lastTime = performance.now(); // avoid a big deltaTime jump after resuming
      pauseBtn.textContent = '⏸ 一時停止';
    }
  }

  document.addEventListener('keydown', event => {
    if (event.keyCode === 80) { // P key toggles pause, works even mid-pause
      togglePause();
      return;
    }
    if (gameOver || paused) return;
    if (event.keyCode === 37) moveLeft();
    else if (event.keyCode === 39) moveRight();
    else if (event.keyCode === 40) playerDrop(true);
    else if (event.keyCode === 81) doRotate(-1);
    else if (event.keyCode === 87) doRotate(1);
  });

  // ---- mobile gesture controls ----
  // tap = rotate. flick a direction and keep your finger down = keeps moving that way.
  let touchStartX = 0, touchStartY = 0;
  let heldDirection = null;
  let repeatTimer = null;
  const SWIPE_THRESHOLD = 24;
  const REPEAT_INTERVAL = 130;

  function runDirectionAction(direction){
    if (gameOver || paused) return;
    if (direction === 'left') moveLeft();
    else if (direction === 'right') moveRight();
    else if (direction === 'down') playerDrop(true);
  }

  function startHolding(direction){
    heldDirection = direction;
    if (direction === 'up') {
      hardDrop(); // instant drop, nothing to repeat once the piece has locked
      return;
    }
    runDirectionAction(direction); // fire immediately on the initial flick
    clearInterval(repeatTimer);
    repeatTimer = setInterval(() => runDirectionAction(direction), REPEAT_INTERVAL);
  }

  function stopHolding(){
    clearInterval(repeatTimer);
    repeatTimer = null;
    heldDirection = null;
  }

  function isInteractiveTarget(target){
    return !!target.closest('button, a, .rank-view');
  }

  document.addEventListener('touchstart', (e) => {
    if (isInteractiveTarget(e.target)) return; // let buttons/links handle their own taps
    const t = e.changedTouches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
    stopHolding();
  }, {passive: true});

  document.addEventListener('touchmove', (e) => {
    if (isInteractiveTarget(e.target)) return;
    e.preventDefault(); // stop the page from scrolling while swiping to move a piece
    if (gameOver || paused || heldDirection) return; // already locked into a direction for this touch
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    if (absDx < SWIPE_THRESHOLD && absDy < SWIPE_THRESHOLD) return; // not enough movement yet

    if (absDy > absDx) {
      if (dy > 0) startHolding('down');
      else startHolding('up'); // instant hard drop
    } else {
      startHolding(dx > 0 ? 'right' : 'left');
    }
  }, {passive: false});

  document.addEventListener('touchend', (e) => {
    if (isInteractiveTarget(e.target)) return;
    e.preventDefault();
    const wasHolding = heldDirection !== null;
    stopHolding();
    if (gameOver || paused || wasHolding) return; // a flick already happened, don't also rotate
    doRotate(1); // released without ever crossing the threshold = tap = rotate
  }, {passive: false});

  // ============ format layer: score/best/ranking/background/links ============
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const levelEl = document.getElementById('level');
  const newBadge = document.getElementById('newBadge');
  const overlay = document.getElementById('overlay');
  const overlayMsg = document.getElementById('overlayMsg');
  const overlaySub = document.getElementById('overlaySub');
  const overlayBtn = document.getElementById('overlayBtn');
  const newGameBtn = document.getElementById('newGameBtn');
  const pauseBtn = document.getElementById('btnPause');
  const rankBtn = document.getElementById('rankBtn');
  const backBtn = document.getElementById('backBtn');
  const rankView = document.getElementById('rankView');
  const rankList = document.getElementById('rankList');
  const resetBtn = document.getElementById('resetBtn');

  const STORAGE_KEY = 'tetris_best';
  const HISTORY_KEY = 'tetris_history';

  let bestScore = 0;

  function loadBest(){
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? parseInt(saved, 10) || 0 : 0;
    } catch (e) { return 0; }
  }

  function saveBest(value){
    try { localStorage.setItem(STORAGE_KEY, String(value)); } catch (e) {}
  }

  function updateScore(){
    scoreEl.textContent = player.score;
    if(player.score > bestScore){
      bestScore = player.score;
      saveBest(bestScore);
      newBadge.classList.add('show');
    }
    bestEl.textContent = bestScore;
  }

  function loadHistory(){
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  }

  function saveHistoryEntry(finalScore){
    try {
      const list = loadHistory();
      const now = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      const stamp = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
      list.push({ score: finalScore, date: stamp });
      list.sort((a,b) => b.score - a.score);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(list.slice(0, 10)));
    } catch (e) {}
  }

  function renderRanking(){
    const list = loadHistory();
    rankList.innerHTML = '';
    if(list.length === 0){
      const empty = document.createElement('div');
      empty.className = 'rank-empty';
      empty.textContent = 'まだ記録がありません。ゲームオーバーになると記録されます。';
      rankList.appendChild(empty);
      return;
    }
    list.forEach((entry, i) => {
      const li = document.createElement('li');
      if(i === 0) li.classList.add('top1');
      li.innerHTML = `
        <span class="rank-num">${i+1}</span>
        <span class="rank-score">${entry.score}</span>
        <span class="rank-date">${entry.date}</span>
        <button class="rank-share" title="Xでシェア" data-score="${entry.score}" data-rank="${i+1}">𝕏</button>
      `;
      rankList.appendChild(li);
    });
  }

  function shareToX(score, rank){
    const text = `テトリス「降り積む夜」で ${score}点を記録しました🌙✨(歴代${rank}位)\n#LevaCraft`;
    const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
    window.open(url, '_blank', 'noopener,noreferrer');
  }

  function endGame(){
    gameOver = true;
    saveHistoryEntry(player.score);
    overlayMsg.textContent = 'ゲームオーバー';
    overlaySub.textContent = `スコア: ${player.score}`;
    overlay.classList.add('show');
  }

  function resetGame(){
    arena.forEach(row => row.fill(0));
    player.score = 0;
    gameOver = false;
    paused = false;
    clearing = false;
    clearingRows = [];
    lockTimer = 0;
    clearInterval(flashTimer);
    lastPieceType = null;
    pieceStreak = 0;
    nextType = randomPieceType();
    level = 1;
    totalLinesCleared = 0;
    dropInterval = 1000;
    levelEl.textContent = level;
    pauseBtn.textContent = '⏸ 一時停止';
    overlayBtn.textContent = 'もう一度';
    newBadge.classList.remove('show');
    bestScore = loadBest();
    updateScore();
    overlay.classList.remove('show');
    playerReset();
  }

  overlayBtn.addEventListener('click', () => {
    if (paused) { togglePause(); return; }
    resetGame();
  });
  newGameBtn.addEventListener('click', resetGame);
  pauseBtn.addEventListener('click', togglePause);



  rankBtn.addEventListener('click', () => {
    renderRanking();
    rankView.classList.add('show');
  });

  backBtn.addEventListener('click', () => {
    rankView.classList.remove('show');
  });

  rankList.addEventListener('click', (e) => {
    const btn = e.target.closest('.rank-share');
    if(!btn) return;
    shareToX(btn.dataset.score, btn.dataset.rank);
  });

  resetBtn.addEventListener('click', () => {
    const ok = confirm('歴代ベスト10とベストスコアを消去します。よろしいですか？');
    if(!ok) return;
    try {
      localStorage.removeItem(HISTORY_KEY);
      localStorage.removeItem(STORAGE_KEY);
    } catch (e) {}
    bestScore = 0;
    bestEl.textContent = 0;
    newBadge.classList.remove('show');
    renderRanking();
  });

  // ---- boot ----
  bestScore = loadBest();
  updateScore();
  playerReset();
  update();
})();
</script>

</body>
</html>
